name: cricbid
description: CricBid - Cricket Player Auction App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.4
  firebase_messaging: ^14.9.3

  # Notifications
  flutter_local_notifications: ^17.1.2

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.13.1
  path_provider: ^2.1.3

  # Excel Parsing
  excel: ^4.0.3

  # Image
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.2.0

  # File Picker
  file_picker: ^8.0.3

  # Animations
  lottie: ^3.1.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0

  # Charts / Dashboard
  fl_chart: ^0.68.0

  # Responsive
  flutter_screenutil: ^5.9.3
  responsive_framework: ^1.3.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  collection: ^1.18.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  badges: ^3.1.2
  dotted_border: ^2.1.0
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  flutter_colorpicker: ^1.1.0
  http: ^1.2.1
  smooth_page_indicator: ^1.2.0+3
  pinput: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Logo.png"
  
  windows:
    generate: true
    image_path: "assets/Logo.png"
    icon_size: 256 
    
  macos:
    generate: true
    image_path: "assets/Logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/

  # fonts:
  #   - family: CricBid
  #     fonts:
  #       - asset: assets/fonts/
